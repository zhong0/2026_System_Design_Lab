events {}

http {
  server {
    listen 80;

    # 所有請求都轉發到 Kong
    location / {
      proxy_pass http://kong:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr; # 把真實 IP 帶到 kong
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 請求經過哪些 Proxy 的 IP
    }
  }
}