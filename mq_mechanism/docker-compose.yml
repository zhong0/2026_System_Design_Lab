services:
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mq-mechanism-network
    restart: unless-stopped

  kafka:
    container_name: kafka
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - mq-mechanism-network
    restart: unless-stopped

  raise_grab_service:
    container_name: raise_grab_service
    build: ./raise_grab_service
    image: mq_mechanism_raise_grab:dev-1.0.0
    ports:
      - "1004:1004"
    networks:
      - mq-mechanism-network
    volumes:
      - ./raise_grab_service:/app
    environment:
      - APP_NAME=Raise Grab Service
      - CODE_ROOT=/app
      - SERVER_PORT=1004
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_QUEUE=grab_requests
      - RABBITMQ_CONTROL_QUEUE=grab_control
      - TOTAL_SPOTS=3
      - SYNC_DELAY_MS=1500
      - LOG_LEVEL=INFO
    depends_on:
      - rabbitmq
    restart: unless-stopped

  grab_worker_service:
    container_name: grab_worker_service
    build: ./grab_worker_service
    image: mq_mechanism_grab_worker:dev-1.0.0
    networks:
      - mq-mechanism-network
    volumes:
      - ./grab_worker_service:/app
    environment:
      - APP_NAME=Grab Worker
      - CODE_ROOT=/app
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_QUEUE=grab_requests
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC_REQUESTS=grab_requests_log
      - KAFKA_TOPIC_RESULTS=grab_results_log
      - TOTAL_SPOTS=3
      - PROCESS_DELAY_MS=1500
      - LOG_LEVEL=INFO
    depends_on:
      - rabbitmq
      - kafka
    restart: unless-stopped

  event_log_service:
    container_name: event_log_service
    build: ./event_log_service
    image: mq_mechanism_event_log:dev-1.0.0
    ports:
      - "1003:1003"
    networks:
      - mq-mechanism-network
    volumes:
      - ./event_log_service:/app
    environment:
      - APP_NAME=Event Log Service
      - CODE_ROOT=/app
      - SERVER_PORT=1003
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC_REQUESTS=grab_requests_log
      - KAFKA_TOPIC_RESULTS=grab_results_log
      - LOG_LEVEL=INFO
    depends_on:
      - kafka
    restart: unless-stopped

  kafka_ui:
    container_name: kafka_ui
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "1005:8080"
    networks:
      - mq-mechanism-network
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - DYNAMIC_CONFIG_ENABLED=true
    depends_on:
      - kafka
    restart: unless-stopped

networks:
  mq-mechanism-network:
    driver: bridge
